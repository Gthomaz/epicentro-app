<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Álbum Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A00E0;
            --secondary: #8E2DE2;
            --surface: rgba(255, 255, 255, 0.95);
            --background: #f4f7fe;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-section {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .form-section h2 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 1rem;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
            outline: none;
            background: #f9fafb;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 0, 224, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 0, 224, 0.4);
            filter: brightness(110%);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #feedbackBox {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback-success {
            background-color: #d1fae5;
            color: var(--success);
            border: 1px solid #34d399;
        }

        .feedback-error {
            background-color: #fee2e2;
            color: var(--error);
            border: 1px solid #f87171;
        }

        pre {
            text-align: left;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.5rem;
            border-radius: 8px;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Álbum Virtual</h1>
            <p>Fortaleza de Segurança: Cadastro Vinculado</p>
        </div>

        <form id="cadastroForm">
            <!-- DADOS DO ADULTO -->
            <div class="form-section">
                <h2>1. Dados do Responsável</h2>
                <div class="input-group">
                    <label for="nome_completo">Nome Completo</label>
                    <input type="text" id="nome_completo" placeholder="Ex: João da Silva" required>
                </div>
                <div class="input-group">
                    <label for="cpf">CPF (Somente números)</label>
                    <input type="text" id="cpf" placeholder="Ex: 12345678900" required maxlength="14">
                </div>
                <div class="input-group">
                    <label for="senha_master">Senha do Responsável</label>
                    <input type="password" id="senha_master" placeholder="Crie uma senha segura" required>
                </div>
                <div class="input-group">
                    <label for="data_nascimento">Data de Nascimento</label>
                    <input type="date" id="data_nascimento" required>
                </div>
            </div>

            <!-- DADOS DA CRIANÇA -->
            <div class="form-section">
                <h2>2. Dados da Criança</h2>
                <div class="input-group">
                    <label for="nickname_filho">Nickname do Filho</label>
                    <input type="text" id="nickname_filho" placeholder="Ex: Joaozinho123" required>
                </div>
                <div class="input-group">
                    <label for="nascimento_filho">Data de Nascimento do Filho</label>
                    <input type="date" id="nascimento_filho" required>
                </div>
                <div class="input-group">
                    <label for="senha_filho">Senha/PIN da Criança</label>
                    <input type="password" id="senha_filho" placeholder="Senha simples ou PIN" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Enviar Cadastro Blindado</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>

        <div id="feedbackBox"></div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Referências de UI
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const feedbackBox = document.getElementById('feedbackBox');

            // Reset UI
            feedbackBox.style.display = 'none';
            feedbackBox.style.opacity = '0';
            feedbackBox.className = '';
            feedbackBox.innerHTML = '';
            
            // Estado de Loading
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            btn.style.pointerEvents = 'none';

            // Coletar Dados
            const payload = {
                nome_completo: document.getElementById('nome_completo').value,
                cpf: document.getElementById('cpf').value.replace(/\D/g, ''), // Limpa máscara caso tenha
                senha_master: document.getElementById('senha_master').value,
                data_nascimento: document.getElementById('data_nascimento').value,
                nickname_filho: document.getElementById('nickname_filho').value,
                senha_filho: document.getElementById('senha_filho').value,
                nascimento_filho: document.getElementById('nascimento_filho').value
            };

            try {
                // Fetch para a nossa API
                const response = await fetch('http://localhost:3000/api/cadastro/responsavel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Exibir feedback
                feedbackBox.style.display = 'block';
                
                // Animação suave
                setTimeout(() => {
                    feedbackBox.style.opacity = '1';
                }, 10);

                if (response.ok) {
                    feedbackBox.classList.add('feedback-success');
                    feedbackBox.innerHTML = `
                        ✅ ${data.message}
                        <pre>${JSON.stringify(data.dados, null, 2)}</pre>
                    `;
                    // Limpar formulário se deu certo
                    document.getElementById('cadastroForm').reset();
                } else {
                    feedbackBox.classList.add('feedback-error');
                    feedbackBox.innerHTML = `❌ Erro: ${data.error}`;
                }

            } catch (error) {
                feedbackBox.style.display = 'block';
                feedbackBox.style.opacity = '1';
                feedbackBox.classList.add('feedback-error');
                feedbackBox.innerHTML = `❌ Erro de Conexão: O servidor está rodando?`;
            } finally {
                // Retirar Estado de Loading
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                btn.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>
</html>
