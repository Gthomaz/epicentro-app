<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF416C;
            --secondary: #FF4B2B;
            --dark: #1e1e24;
            --light: #f4f4f9;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, #2a2a35 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), #FFB75E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .stat-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-abrir {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-abrir:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 65, 108, 0.6);
        }

        .btn-abrir:active {
            transform: translateY(1px);
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estrutura do Card com efeito Flip 3D */
        .card, .sticker-card {
            background: transparent;
            width: 220px;
            height: 360px; /* Altura calibrada para caber tudo sem cortes */
            perspective: 1000px;
            cursor: pointer;
            margin: 0 auto;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Classe ativada via JS ao clicar */
        .card.flipped .card-inner, .sticker-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 14px;
        }

        /* FRENTE: Estilo Dourado Lendário Glassmorphism */
        .card-front {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 215, 0, 0.7); /* Borda Dourada */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.25), inset 0 0 15px rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .card-badge-country {
            font-size: 0.75rem;
            color: rgba(255, 215, 0, 0.9);
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-player-name {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 4px 0;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card-avatar-box {
            width: 110px;
            height: 110px;
            margin: 0 auto;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Grade de Atributos */
        .card-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 10px 0;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 0.95rem;
            font-weight: bold;
            color: #22c55e; /* Verde para destaque */
        }

        .stat-label {
            font-size: 0.6rem;
            color: #a1a1aa;
            text-transform: uppercase;
        }

        /* Rodapé com o Fato Completo - Blindado contra cortes */
        .card-fact-footer {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 8px;
            font-size: 0.68rem;
            line-height: 1.2;
            color: #e4e4e7;
            text-align: left;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        /* VERSO: Trajetória e Biografia */
        .card-back {
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.98) 0%, rgba(10, 10, 15, 0.98) 100%);
            border: 2px solid rgba(255, 215, 0, 0.4);
            color: #e4e4e7;
            transform: rotateY(180deg);
            justify-content: flex-start;
            text-align: left;
        }

        .card-back h3 {
            font-size: 1rem;
            color: rgba(255, 215, 0, 1);
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 4px;
        }

        .card-back p {
            font-size: 0.75rem;
            line-height: 1.4;
            color: #d4d4d8;
        }

        .badge-raridade {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-qtd {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: white;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
        }

        .lendaria { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #000; }
        .rara { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); color: #000; }
        .comum { background: #4b5563; color: white; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .modal-content {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        /* Animação do Pacotinho */
        /* ANIMACAO DO PACOTE PREMIUM */
        .pack-anim {
            width: 220px; height: 320px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            border-radius: 12px;
            border: 3px solid #FFF;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: 900; color: #FFF;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.5);
            animation: float-pack 2s ease-in-out infinite, pulse-glow 1.5s infinite alternate;
            position: relative;
            overflow: hidden;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            transition: transform 0.3s;
        }

        .pack-anim:hover {
            transform: scale(1.05);
        }
        
        .pack-anim::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes float-pack {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 80px rgba(255, 215, 0, 1), 0 0 30px rgba(255, 140, 0, 0.8); }
        }

        @keyframes shine {
            0% { left: -100%; top: -100%; }
            100% { left: 100%; top: 100%; }
        }

        /* Animação de Explosão (aplicada via JS) */
        .explode-anim {
            animation: explode-pack 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }

        @keyframes explode-pack {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            40% { transform: scale(1.2) rotate(-5deg); filter: brightness(1.5); }
            60% { transform: scale(1.5) rotate(15deg); filter: brightness(2) drop-shadow(0 0 100px #fff); }
            100% { transform: scale(3); opacity: 0; filter: brightness(3); }
        }

        /* Efeito das Cartas Caindo e Quicando */
        .card-reveal {
            opacity: 0;
            transform: translateY(-200px) scale(0.1) rotate(-20deg);
            animation: drop-bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes drop-bounce {
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
        }

        .close-modal {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: transparent;
            border: 2px solid white;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: none;
        }
        
        .close-modal:hover {
            background: white;
            color: black;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Meu Álbum Virtual</h1>
        <div class="stats">
            <div class="stat-badge">
                <span>📚</span> <span id="totalCards">0</span> Coladas
            </div>
            <button class="btn-abrir" onclick="startOpeningPack()">Abrir Pacotinho!</button>
        </div>
    </div>

    <div class="album-grid" id="albumGrid">
        <!-- Figurinhas vão aparecer aqui -->
    </div>

    <!-- Modal de Abertura de Pacotinho -->
    <div class="modal-overlay" id="modalOverlay">
        <div id="pack-item" class="pack-anim">RASGAR PACOTINHO!</div>
        <div class="modal-content" id="cards-reveal"></div>
        <button class="close-modal" id="close-pack-btn" onclick="closeModal()">Guardar Figurinhas</button>
    </div>

    <script>

        if(!token) {

            window.location.href = 'teste-login.html';

        let newCardsData = [];

        async function loadAlbum() {

                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(!res.ok) throw new Error('Erro ao carregar');
                
                const data = await res.json();
                renderAlbum(data.album);
            } catch (err) {
                console.error(err);
            }
        }

        const dadosFigurinhas = [

            {

                fato: "A muralha brasileira. Calmo sob pressão e dono de reflexos inacreditáveis.",

        function renderAlbum(album) {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            
            let coladas = 0;

            album.forEach(registro => {
                const fig = registro.figurinha;
                coladas += registro.quantidade;

                const extras = dadosFigurinhas.find(d => d.nome === fig.nome_jogador) || dadosFigurinhas[0];
                const avatarImg = extras.avatar || fig.imagem;

                const cardElement = document.createElement("div");
                cardElement.className = "sticker-card card";
                cardElement.setAttribute("onclick", "this.classList.toggle('flipped')");

                cardElement.innerHTML = `
                    ${registro.quantidade > 1 ? '<div class="badge-qtd">' + registro.quantidade + '</div>' : ''}
                    <div class="card-inner">
                        <div class="card-front">
                            <span class="card-badge-country">${extras.pais}</span>
                            <h4 class="card-player-name">${fig.nome_jogador}</h4>
                            
                            <div class="card-avatar-box">
                                <img src="${avatarImg}" alt="${fig.nome_jogador}" onerror="this.src='https://via.placeholder.com/110?text=Craque'">
                            </div>
                            
                            <div class="card-stats-grid">
                                <div class="stat-box">
                                    <div class="stat-value">${extras.habilidade}</div>
                                    <div class="stat-label">Hab</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${extras.ousadia}</div>
                                    <div class="stat-label">Ous</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${extras.drible}</div>
                                    <div class="stat-label">Dri</div>
                                </div>
                            </div>
                            
                            <div class="card-fact-footer">
                                <p><strong>Fato:</strong> ${extras.fato}</p>
                            </div>
                        </div>
                        
                        <div class="card-back">
                            <h3>${fig.nome_jogador}</h3>
                            <p><strong>Trajetória:</strong> ${extras.biografia}</p>
                            <p style="margin-top: auto; font-size: 0.6rem; color: rgba(255,215,0,0.6); text-align: center; width: 100%;">
                                Epicentro Copa 2026 • Clique para virar
                            </p>
                        </div>
                    </div>
                `;
                grid.appendChild(cardElement);
            });

            document.getElementById('totalCards').innerText = coladas;
        }

        async function startOpeningPack() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('pack-item').style.display = 'flex';
            document.getElementById('cards-reveal').innerHTML = '';
            document.getElementById('close-pack-btn').classList.add('hidden');

            try {
                const res = await fetch('http://localhost:3000/api/album/abrir-pacotinho', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(!res.ok) throw new Error('Erro ao abrir pacotinho');
                
                const data = await res.json();
                revealCards(data.figurinhas);
            } catch(e) {
                alert('Erro ao abrir o pacotinho! Tente novamente.');
                closeModal();
            }
        }

        function revealCards(newCardsData) {
            const packItem = document.getElementById('pack-item');

            packItem.onclick = () => {
                packItem.classList.add('explode-anim');

                setTimeout(() => {
                    packItem.style.display = 'none';
                    packItem.classList.remove('explode-anim');

                    const container = document.getElementById('cards-reveal');
                    container.innerHTML = '';
                    container.style.display = 'grid';
                    
                    newCardsData.forEach((fig, index) => {
                        const extras = dadosFigurinhas.find(d => d.nome === fig.nome_jogador) || dadosFigurinhas[0];
                        const avatarImg = (extras.avatar || fig.imagem).replace(/^\//, '');

                        setTimeout(() => {
                            const cardElement = document.createElement("div");
                            cardElement.className = "sticker-card card-reveal";
                            cardElement.setAttribute("onclick", "this.classList.toggle('flipped')");

                            cardElement.innerHTML = `
                                <div class="badge-qtd" style="background:${fig.is_nova ? '#10b981' : '#f59e0b'}; font-size:0.6rem; width:auto; padding:0 5px; right:10px; top:10px; z-index:10;">${fig.is_nova ? 'Nova!' : 'Repetida'}</div>
                                <div class="card-inner">
                                    <div class="card-front">
                                        <span class="card-badge-country">${extras.pais}</span>
                                        <h4 class="card-player-name">${fig.nome_jogador}</h4>
                                        
                                        <div class="card-avatar-box">
                                            <img src="${avatarImg}" alt="${fig.nome_jogador}" onerror="this.src='https://via.placeholder.com/110?text=Craque'">
                                        </div>
                                        
                                        <div class="card-stats-grid">
                                            <div class="stat-box"><div class="stat-value">${extras.habilidade}</div><div class="stat-label">Hab</div></div>
                                            <div class="stat-box"><div class="stat-value">${extras.ousadia}</div><div class="stat-label">Ous</div></div>
                                            <div class="stat-box"><div class="stat-value">${extras.drible}</div><div class="stat-label">Dri</div></div>
                                        </div>
                                        
                                        <div class="card-fact-footer"><p><strong>Fato:</strong> ${extras.fato}</p></div>
                                    </div>
                                    
                                    <div class="card-back">
                                        <h3>${fig.nome_jogador}</h3>
                                        <p><strong>Trajetória:</strong> ${extras.biografia}</p>
                                        <p style="margin-top: auto; font-size: 0.6rem; color: rgba(255,215,0,0.6); text-align: center; width: 100%;">
                                            Epicentro Copa 2026 • Clique para virar
                                        </p>
                                    </div>
                                </div>
                            `;
                            container.appendChild(cardElement);
                        }, index * 200);
                    });

                    document.getElementById('close-pack-btn').classList.remove('hidden');
                }, 800);
            };
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            loadAlbum(); // Recarrega o grid principal
        }

        // Iniciar
        loadAlbum();
    </script>
</body>
</html>
